<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智学伴侣 - 每日学习打卡</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#e4e8ec 100%);min-height:100vh}
        #welcomeScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;text-align:center;padding:20px}
        #welcomeScreen.hidden{display:none!important}
        .welcome-logo{width:100px;height:100px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:30px;font-size:50px}
        .welcome-title{font-size:3rem;font-weight:700;margin-bottom:15px}
        .welcome-subtitle{font-size:1.2rem;opacity:0.9;margin-bottom:40px}
        .role-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
        .role-card{background:white;color:#333;padding:40px 50px;border-radius:20px;cursor:pointer;transition:all 0.3s;min-width:220px}
        .role-card:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,0,0,0.3)}
        .role-card-icon{font-size:48px;margin-bottom:15px}
        #mainApp{display:none;padding:20px;max-width:1200px;margin:0 auto}
        #mainApp.active{display:block!important}
        .header{background:white;padding:20px 30px;border-radius:15px;margin-bottom:25px;box-shadow:0 4px 15px rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px}
        .header h1{font-size:1.8rem;color:#4F46E5}
        .btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s}
        .btn-primary{background:#4F46E5;color:white}.btn-success{background:#10B981;color:white}.btn-danger{background:#EF4444;color:white}.btn-secondary{background:#6B7280;color:white}
        .nav-tabs{display:flex;gap:8px;margin-bottom:25px;flex-wrap:wrap;background:white;padding:10px;border-radius:12px}
        .nav-tab{padding:10px 18px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#666}
        .nav-tab:hover{background:#f3f4f6;color:#4F46E5}.nav-tab.active{background:#4F46E5;color:white}
        .content-area{display:none}.content-area.active{display:block}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:white;padding:25px;border-radius:15px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.08)}
        .stat-value{font-size:2.5rem;font-weight:700;margin-bottom:5px}.stat-label{color:#666;font-size:0.95rem}
        .checkin-section{background:white;padding:40px;border-radius:20px;text-align:center;margin-bottom:25px}
        .checkin-btn{background:linear-gradient(135deg,#10B981 0%,#34D399 100%);color:white;border:none;padding:25px 60px;border-radius:50px;font-size:1.4rem;font-weight:700;cursor:pointer}
        .task-list{background:white;border-radius:15px;padding:25px}
        .task-item{padding:18px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:15px}
        .task-item:last-child{border-bottom:none}
        .task-checkbox{width:28px;height:28px;border:2px solid #d1d5db;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .task-checkbox.completed{background:#10B981;border-color:#10B981;color:white}
        .task-info{flex:1}.task-points{background:linear-gradient(135deg,#F59E0B,#FBBF24);color:white;padding:4px 12px;border-radius:15px;font-size:0.85rem;font-weight:600}
        .plan-card{background:white;padding:20px;border-radius:15px;margin-bottom:15px}
        .plan-badge{padding:4px 12px;border-radius:15px;font-size:0.85rem}
        .progress-bar{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;margin:10px 0}
        .progress-fill{height:100%;background:linear-gradient(90deg,#4F46E5,#818CF8);border-radius:5px}
        .knowledge-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
        .knowledge-card{background:white;padding:20px;border-radius:15px;cursor:pointer;transition:all 0.2s}
        .knowledge-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,0.12)}
        .unit-list{margin-top:15px;max-height:200px;overflow-y:auto}
        .unit-item{padding:10px;background:#f9fafb;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
        .unit-item:hover{background:#e5e7eb}
        .unit-item.selected{background:#dbeafe;border:2px solid #4F46E5}
        .achievement-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px}
        .achievement-card{background:white;padding:25px;border-radius:15px;text-align:center}
        .achievement-card.locked{opacity:0.5;filter:grayscale(1)}
        .shop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
        .shop-card{background:white;padding:25px;border-radius:15px;text-align:center}
        .leaderboard-list{background:white;border-radius:15px;overflow:hidden}
        .leaderboard-item{padding:18px 25px;display:flex;align-items:center;gap:15px;border-bottom:1px solid #e5e7eb}
        .leaderboard-rank{width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
        .leaderboard-rank.gold{background:linear-gradient(135deg,#F59E0B,#FBBF24);color:white}
        .leaderboard-rank.silver{background:linear-gradient(135deg,#9CA3AF,#D1D5DB);color:white}
        .leaderboard-rank.bronze{background:linear-gradient(135deg,#B45309,#D97706);color:white}
        .leaderboard-avatar{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:white;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:600}
        .child-card{background:white;padding:20px;border-radius:15px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
        .child-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:white;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;padding:20px}
        .modal.active{display:flex;justify-content:center;align-items:center}
        .modal-content{background:white;padding:30px;border-radius:20px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto}
        .form-group{margin-bottom:15px}.form-group label{display:block;margin-bottom:5px;font-weight:500}.form-group input,.form-group select{width:100%;padding:10px 15px;border:2px solid #e5e7eb;border-radius:8px;font-size:1rem}
        .checkin-result{margin-top:20px;padding:15px;border-radius:10px}
        .checkin-result.success{background:#D1FAE5;color:#065F46}.checkin-result.already{background:#FEF3C7;color:#92400E}
        .learning-content{background:#f9fafb;padding:15px;border-radius:10px;margin-top:10px;font-size:0.9rem}
        .quiz-option{padding:12px;background:white;border:2px solid #e5e7eb;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
        .quiz-option:hover{border-color:#4F46E5}
        .quiz-option.correct{background:#d1fae5;border-color:#10B981}
        .quiz-option.wrong{background:#fee2e2;border-color:#EF4444}
        .quiz-input{width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:8px;font-size:1rem}
        .grade-filter{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;padding:15px;background:white;border-radius:12px}
        .grade-filter select{padding:8px 15px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px}
        @media(max-width:768px){.welcome-title{font-size:2rem}.header{flex-direction:column;text-align:center}.stats-grid{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
<div id="welcomeScreen">
    <div class="welcome-logo">STUDY</div>
    <h1 class="welcome-title">智学伴侣</h1>
    <p class="welcome-subtitle">每日学习打卡，陪伴孩子成长</p>
    <div class="role-cards">
        <div class="role-card" id="btnParent"><div class="role-card-icon">👨‍👩‍👧</div><h2>我是家长</h2><p>管理孩子，定制学习计划</p></div>
        <div class="role-card" id="btnStudent"><div class="role-card-icon">S</div><h2>我是学生</h2><p>每日打卡，学习知识</p></div>
    </div>
</div>
<div id="mainApp">
    <div class="header">
        <div><h1>智学伴侣</h1><p>欢迎, <span id="userName">用户</span> | <span id="userRole">角色</span></p></div>
    </div>
    <div class="nav-tabs">
        <button class="nav-tab active" data-tab="dashboard">[仪表盘]</button><button class="nav-tab" data-tab="checkin">[打卡]</button><button class="nav-tab" data-tab="plans">[计划]</button><button class="nav-tab" data-tab="knowledge">[知识库]</button><button class="nav-tab" data-tab="quiz">[测试]</button><button class="nav-tab" data-tab="achievements">[成就]</button><button class="nav-tab" data-tab="shop">[商店]</button><button class="nav-tab" data-tab="children">[孩子]</button>
    </div>
    <div class="content-area active" id="dashboard">
        <div class="stats-grid">
            <div class="stat-card"><div style="font-size:24px;color:#F59E0B">🔥</div><div class="stat-value" id="streakDays" style="color:#F59E0B">0</div><div class="stat-label">连续打卡</div></div>
            <div class="stat-card"><div style="font-size:24px;color:#10B981">⭐</div><div class="stat-value" id="totalPoints" style="color:#10B981">0</div><div class="stat-label">总积分</div></div>
            <div class="stat-card"><div style="font-size:24px;color:#4F46E5">Lv</div><div class="stat-value" id="userLevel" style="color:#4F46E5">Lv.1</div><div class="stat-label">等级</div></div>
            <div class="stat-card"><div style="font-size:24px;color:#EF4444">[UNIT]</div><div class="stat-value" id="completedUnits" style="color:#EF4444">0</div><div class="stat-label">已学单元</div></div>
        </div>
        <h2 style="margin-bottom:15px">今日学习任务</h2>
        <div class="task-list" id="taskList"></div>
    </div>
    <div class="content-area" id="checkin">
        <div class="checkin-section"><h2 style="margin-bottom:20px">每日打卡</h2>        <button class="checkin-btn" id="btnCheckin">立即打卡</button><div id="checkinResult"></div></div>
        <h3 style="margin-bottom:15px">打卡记录</h3>
        <div class="task-list" id="checkinHistory"></div>
    </div>
    <div class="content-area" id="plans">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px"><h2>学习计划</h2><div style="display:flex;gap:10px"><button class="btn btn-success" id="btnCreatePlan">+ 创建计划</button><button class="btn btn-primary" id="btnSmartPlan">AI 智能生成</button></div></div>
        <div id="planList"></div>
    </div>
    <div class="content-area" id="knowledge">
        <h2 style="margin-bottom:20px">知识库</h2>
        <div class="grade-filter">
            <select id="filterGrade"><option value="0">全部年级</option><option value="1-6">小学(1-6年级)</option><option value="7-9">初中(7-9年级)</option><option value="10-12">高中(10-12年级)</option></select>
            <select id="filterSubject"><option value="">全部学科</option><option value="语文">语文</option><option value="数学">数学</option><option value="英语">英语</option><option value="物理">物理</option><option value="化学">化学</option><option value="生物">生物</option><option value="历史">历史</option><option value="地理">地理</option><option value="道德与法治">道德与法治</option></select>
            <select id="filterSemester"><option value="">全部学期</option><option value="1">上学期</option><option value="2">下学期</option></select>
            <button class="btn btn-primary" id="btnFilter">筛选</button>
        </div>
        <div id="knowledgeContent"></div>
    </div>
    <div class="content-area" id="quiz">
        <h2 style="margin-bottom:20px">学习测试</h2>
        <p style="color:#666;margin-bottom:20px">根据学习计划自动生成的测试题</p>
        <div id="quizContent"></div>
    </div>
    <div class="content-area" id="achievements"><h2 style="margin-bottom:20px">成就徽章</h2><div class="achievement-grid" id="achievementList"></div></div>
    <div class="content-area" id="shop"><h2 style="margin-bottom:20px">积分商店</h2><div class="shop-grid" id="shopList"></div></div>
    <div class="content-area" id="children">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px"><h2>孩子管理</h2><button class="btn btn-success" id="btnAddChild">+ 添加孩子</button></div>
        <div id="childList"></div>
    </div>
</div>
<div class="modal" id="childModal">
    <div class="modal-content"><h2 id="childModalTitle" style="margin-bottom:20px">添加孩子</h2>
        <div class="form-group"><label>昵称 *</label><input type="text" id="childName" placeholder="请输入孩子昵称"></div>
        <div class="form-group"><label>年级</label><select id="childGrade"><option value="1">小学一年级</option><option value="2">小学二年级</option><option value="3">小学三年级</option><option value="4">小学四年级</option><option value="5">小学五年级</option><option value="6">小学六年级</option><option value="7">初中一年级</option><option value="8">初中二年级</option><option value="9">初中三年级</option><option value="10">高中一年级</option><option value="11">高中二年级</option><option value="12">高中三年级</option></select></div>
        <div class="form-group"><label>当前学期</label><select id="childSemester"><option value="1">上学期</option><option value="2">下学期</option></select></div>
        <div class="form-group"><label>年龄</label><input type="number" id="childAge" placeholder="请输入年龄" min="6" max="18"></div>
        <button class="btn btn-primary" style="width:100%" id="btnSaveChild">保存</button>
        <button class="btn btn-secondary" style="width:100%;margin-top:10px" id="btnCancelChild">取消</button>
    </div>
</div>
<div class="modal" id="planModal">
    <div class="modal-content"><h2 style="margin-bottom:20px">创建学习计划</h2>
        <div class="form-group"><label>计划名称 *</label><input type="text" id="planName" placeholder="例如：五年级英语下学期"></div>
        <div class="form-group"><label>学科</label><select id="planSubject"><option value="语文">语文</option><option value="数学">数学</option><option value="英语">英语</option><option value="物理">物理</option><option value="化学">化学</option><option value="生物">生物</option><option value="历史">历史</option><option value="地理">地理</option><option value="道德与法治">道德与法治</option></select></div>
        <div class="form-group"><label>年级</label><select id="planGrade"><option value="1">小学一年级</option><option value="2">小学二年级</option><option value="3">小学三年级</option><option value="4">小学四年级</option><option value="5">小学五年级</option><option value="6">小学六年级</option><option value="7">初中一年级</option><option value="8">初中二年级</option><option value="9">初中三年级</option><option value="10">高中一年级</option><option value="11">高中二年级</option><option value="12">高中三年级</option></select></div>
        <div class="form-group"><label>学期</label><select id="planSemester"><option value="1">上学期</option><option value="2">下学期</option></select></div>
        <div class="form-group"><label>每日学习单元数</label><input type="number" id="dailyUnits" value="2" min="1" max="5"></div>
        <div class="form-group"><label>学习周期（天）</label><input type="number" id="planDays" value="30" min="7" max="90"></div>
        <button class="btn btn-primary" style="width:100%" id="btnConfirmPlan">创建</button>
        <button class="btn btn-secondary" style="width:100%;margin-top:10px" id="btnCancelPlan">取消</button>
    </div>
</div>

function switchTab(tabId){
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.content-area').forEach(c=>c.classList.remove('active'));
    document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
    document.getElementById(tabId).classList.add('active');
    if(tabId==='knowledge') renderKnowledge();
    if(tabId==='quiz') renderQuiz();
    if(tabId==='achievements') renderAchievements();
    if(tabId==='shop') renderShop();
}

function selectRole(role){
    const name=prompt('请输入您的名称:');
    if(!name||!name.trim()) return;
    appState.role=role;
    appState.currentUser=name.trim();
    if(role==='student'){
        appState.children=[{
            id:Date.now(),
            name:name.trim(),
            grade:5,
            semester:2,
            age:11,
            points:0,
            level:1,
            exp:0,
            streak:0,
            completedUnits:0,
            avatar:name.trim().charAt(0)
        }];
    }
    saveData();
    showMainApp();
}

function saveData(){
    localStorage.setItem('studyAppData',JSON.stringify(appState));
}

function loadData(){
    const saved=localStorage.getItem('studyAppData');
    if(saved){
        try{
            appState={...appState,...JSON.parse(saved)};
        }catch(e){}
    }
}

function showMainApp(){
    document.getElementById('welcomeScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.add('active');
    document.getElementById('userName').textContent=appState.currentUser;
    document.getElementById('userRole').textContent=appState.role==='parent'?'家长':'学生';
    updateDashboard();
    renderTasks();
    renderCheckinHistory();
    renderPlanList();
    renderKnowledge();
    renderAchievements();
    renderShop();
    renderChildList();
}

function updateDashboard(){
    const child=appState.children[0]||{};
    document.getElementById('streakDays').textContent=child.streak||0;
    document.getElementById('totalPoints').textContent=child.points||0;
    document.getElementById('userLevel').textContent='Lv.'+(child.level||1);
    document.getElementById('completedUnits').textContent=child.completedUnits||0;
    document.getElementById('userBadge').textContent='Lv.'+(child.level||1);
}

function renderKnowledge(){
    const filterGrade=document.getElementById('filterGrade').value;
    const filterSubject=document.getElementById('filterSubject').value;
    const filterSemester=document.getElementById('filterSemester').value;

    let html='<div class="knowledge-grid">';
    let count=0;

    for(const key in knowledgeDB){
        const parts=key.split('_');
        const subject=parts[0];
        const grade=parseInt(parts[1]);
        const semester=parseInt(parts[2]);

        // 筛选逻辑
        if(filterSubject && subject!==filterSubject) continue;
        if(filterSemester && semester!==parseInt(filterSemester)) continue;
        if(filterGrade){
            if(filterGrade==='1-6' && (grade<1||grade>6)) continue;
            if(filterGrade==='7-9' && (grade<7||grade>9)) continue;
            if(filterGrade==='10-12' && (grade<10||grade>12)) continue;
        }

        const data=knowledgeDB[key];
        count++;
        const colorMap={'语文':'#FCE7F3','数学':'#DBEAFE','英语':'#D1FAE5','物理':'#FEF3C7','化学':'#E0E7FF','生物':'#D1FAE5','历史':'#FEE2E2','地理':'#FEF9C3','道德与法治':'#F3E8FF'};

        html+=`<div class="knowledge-card" style="border-left:4px solid ${colorMap[subject]||'#eee'}">
            <h3 style="margin-bottom:10px">${subject} - ${gradeNames[grade-1]}</h3>
            <p style="color:#666;font-size:0.9rem;margin-bottom:10px">${data.name} | ${semester===1?'上学期':'下学期'}</p>
            <div class="unit-list">`;

        data.units.forEach(unit=>{
            const isLearned=appState.learnedUnits.includes(key+'_'+unit.id);
            html+=`<div class="unit-item ${isLearned?'selected':''}" onclick="startLearning('${key}','${unit.id}')">
                <div style="display:flex;justify-content:space-between;align-items:center">
                    <span>${unit.name}</span>
                    <span style="color:#666;font-size:0.85rem">${unit.items.length}个知识点</span>
                </div>
                ${isLearned?'<small style="color:#10B981">✓ 已学习</small>':''}
            </div>`;
        });

        html+='</div></div>';

        if(count>=30) break; // 最多显示30个课程
    }

    if(count===0){
        html+='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#666">暂无匹配课程，请调整筛选条件</div>';
    }

    html+='</div>';
    document.getElementById('knowledgeContent').innerHTML=html;
}

function startLearning(subjectKey,unitId){
    const child=appState.children[0];
    if(!child) return;
    const data=knowledgeDB[subjectKey];
    if(!data) return;
    const unit=data.units.find(u=>u.id===unitId);
    if(!unit) return;

    let html=`<div style="margin-bottom:20px"><button class="btn btn-secondary" onclick="renderKnowledge()">← 返回知识库</button></div>`;
    html+=`<div style="background:white;padding:25px;border-radius:15px;margin-bottom:20px">
        <h3>正在学习: ${unit.name}</h3>
        <p style="color:#666;margin-top:10px">知识点: ${unit.items.length}个 | 预计获得: ${unit.items.reduce((a,b)=>a+b.points,0)}积分</p>
    </div>`;

    unit.items.forEach((item,idx)=>{
        html+=`<div style="background:white;padding:20px;border-radius:15px;margin-bottom:15px">
            <h4 style="margin-bottom:15px">📖 知识点 ${idx+1}/${unit.items.length} <span style="font-size:0.85rem;color:#666">(${item.type==='word'?'词汇':item.type==='calc'?'计算':'理解'})</span></h4>
            <div style="background:#f9fafb;padding:15px;border-radius:10px;margin-bottom:15px">
                <div style="font-size:1.3rem;font-weight:bold;color:#4F46E5;margin-bottom:10px">${item.question}</div>
                <input type="text" class="quiz-input" id="answer_${idx}" placeholder="请输入答案...">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="checkAnswer(${idx},'${item.answer.replace(/'/g,"\\'")}',${item.points})">提交答案</button>
        </div>`;
    });

    html+=`<button class="btn btn-success" style="width:100%;margin-top:10px" onclick="completeUnit('${subjectKey}','${unitId}')">完成本单元学习</button>`;
    document.getElementById('knowledgeContent').innerHTML=html;
}

function checkAnswer(idx,correct,points){
    const input=document.getElementById('answer_'+idx);
    if(!input) return;
    const userAnswer=input.value.trim();
    const isCorrect=userAnswer===correct || userAnswer.includes(correct) || correct.includes(userAnswer);

    if(isCorrect){
        const child=appState.children[0];
        if(child){
            child.points+=points;
            child.exp+=points;
            while(child.exp>=100){child.level++;child.exp-=100}
            saveData();
            updateDashboard();
        }
        input.parentElement.style.background='#d1fae5';
        alert('✓ 正确！+'+points+'积分');
    }else{
        input.parentElement.style.background='#fee2e2';
        alert('✗ 答案: '+correct);
    }
}

function completeUnit(subjectKey,unitId){
    const child=appState.children[0];
    if(!child) return;
    const key=subjectKey+'_'+unitId;
    if(!appState.learnedUnits.includes(key)){
        appState.learnedUnits.push(key);
        child.completedUnits=(child.completedUnits||0)+1;
        child.points+=20;
        child.exp+=20;
        while(child.exp>=100){child.level++;child.exp-=100}
        saveData();
        updateDashboard();
    }
    alert('🎉 恭喜完成本单元学习！+20积分');
    renderKnowledge();
}

function renderQuiz(){
    const child=appState.children[0];
    if(!child){
        document.getElementById('quizContent').innerHTML='<p>请先添加孩子信息</p>';
        return;
    }
    const plan=appState.plans.find(p=>p.active);
    if(!plan){
        document.getElementById('quizContent').innerHTML='<div style="background:white;padding:30px;border-radius:15px;text-align:center"><p style="margin-bottom:20px">还没有学习计划</p><button class="btn btn-primary" onclick="switchTab(\'plans\');generateSmartPlan();">去创建学习计划</button></div>';
        return;
    }
    const key=plan.subject+'_'+plan.grade+'_'+plan.semester;
    const data=knowledgeDB[key];
    if(!data){
        document.getElementById('quizContent').innerHTML='<div style="background:white;padding:30px;border-radius:15px"><p>该课程暂无可用测试题</p><p style="color:#666;margin-top:10px">请在知识库中选择已有课程</p></div>';
        return;
    }

    let html='<div style="background:white;padding:25px;border-radius:15px;margin-bottom:20px">
        <h3>'+plan.name+'</h3>
        <p style="color:#666">学习进度: '+(plan.completedUnits||0)+'/'+plan.totalUnits+' 单元</p>
        <div class="progress-bar"><div class="progress-fill" style="width:'+(plan.totalUnits>0?(plan.completedUnits||0)/plan.totalUnits*100:0)+'%"></div></div>
    </div>';

    const unitsToShow=data.units.slice(plan.completedUnits||0,Math.min((plan.completedUnits||0)+2,data.units.length));
    unitsToShow.forEach((unit,idx)=>{
        html+=`<div style="background:white;padding:20px;border-radius:15px;margin-bottom:15px">
            <h4 style="margin-bottom:15px">📝 ${unit.name} - 测试题</h4>`;
        unit.items.slice(0,3).forEach((item,itemIdx)=>{
            const quizId='quiz_'+idx+'_'+itemIdx;
            html+=`<div style="margin-bottom:15px;padding:15px;background:#f9fafb;border-radius:10px">
                <p style="margin-bottom:10px;font-weight:500">${item.type==='word'?'词汇':item.type==='calc'?'计算':'理解'}: ${item.question}</p>
                <input type="text" class="quiz-input" id="${quizId}" placeholder="请输入答案">
                <button class="btn btn-secondary" style="margin-top:8px" onclick="checkQuizAnswer('${quizId}','${item.answer.replace(/'/g,"\\'")}',${item.points})">提交</button>
            </div>`;
        });
        html+='</div>';
    });

    if((plan.completedUnits||0)>=plan.totalUnits){
        html+='<div style="background:#d1fae5;padding:20px;border-radius:15px;text-align:center"><h3>🎉 已完成所有学习任务！</h3></div>';
    }else{
        html+=`<button class="btn btn-success" style="width:100%;margin-top:15px" onclick="completeQuizUnits(${plan.completedUnits+1})">完成测试并继续</button>`;
    }
    document.getElementById('quizContent').innerHTML=html;
}

function checkQuizAnswer(quizId,correct,points){
    const input=document.getElementById(quizId);
    if(!input) return;
    const userAnswer=input.value.trim();
    const isCorrect=userAnswer===correct || userAnswer.includes(correct) || correct.includes(userAnswer);
    if(isCorrect){
        const child=appState.children[0];
        if(child){
            child.points+=points;
            child.exp+=points;
            while(child.exp>=100){child.level++;child.exp-=100}
            saveData();
            updateDashboard();
        }
        input.style.borderColor='#10B981';
        input.parentElement.style.background='#d1fae5';
    }else{
        input.style.borderColor='#EF4444';
        input.parentElement.style.background='#fee2e2';
    }
}

function completeQuizUnits(count){
    const plan=appState.plans.find(p=>p.active);
    if(plan){
        plan.completedUnits=Math.min((plan.completedUnits||0)+1,plan.totalUnits);
        if(plan.completedUnits>=plan.totalUnits){
            const child=appState.children[0];
            if(child){child.points+=100;}
            alert('🎉 恭喜完成学习计划！奖励100积分！');
        }
        saveData();
    }
    renderQuiz();
    renderPlanList();
}

function doCheckin(){
    const child=appState.children[0];
    if(!child){alert('请先添加孩子信息');return;}
    const today=new Date().toDateString();
    if(appState.checkins.some(c=>c.date===today)){
        document.getElementById('checkinResult').innerHTML='<div class="checkin-result already">今日已打卡！继续加油！</div>';
        return;
    }
    const yesterday=new Date(Date.now()-86400000).toDateString();
    child.streak=appState.checkins.some(c=>c.date===yesterday)?child.streak+1:1;
    const points=10+Math.min(child.streak*2,20);
    appState.checkins.push({date:today,points});
    child.points+=points;
    child.exp+=points;
    while(child.exp>=100){child.level++;child.exp-=100}
    saveData();
    updateDashboard();
    renderCheckinHistory();
    document.getElementById('checkinResult').innerHTML='<div class="checkin-result success">打卡成功！+'+points+'积分 连续'+child.streak+'天</div>';
}

function renderCheckinHistory(){
    const container=document.getElementById('checkinHistory');
    const checkins=appState.checkins.slice(-7).reverse();
    if(checkins.length===0){container.innerHTML='<p style="text-align:center;color:#666;padding:20px">暂无记录</p>';return;}
    let html='';
    checkins.forEach(c=>{
        const d=new Date(c.date);
        html+=`<div class="task-item">
            <div class="task-checkbox completed">✓</div>
            <div class="task-info">
                <div style="font-weight:500">${d.getMonth()+1}月${d.getDate()}日</div>
                <div style="font-size:0.85rem;color:#666">连续打卡${appState.children[0]?.streak||0}天</div>
            </div>
            <span class="task-points">+${c.points||10}</span>
        </div>`;
    });
    container.innerHTML=html;
}

function renderTasks(){
    const child=appState.children[0];
    const container=document.getElementById('taskList');
    if(!child||appState.plans.length===0){
        container.innerHTML='<p style="text-align:center;color:#666;padding:20px">暂无学习任务，请先创建学习计划</p>';
        return;
    }
    const plan=appState.plans.find(p=>p.active);
    if(!plan){container.innerHTML='<p style="text-align:center;color:#666;padding:20px">暂无进行中的学习任务</p>';return;}
    const key=plan.subject+'_'+plan.grade+'_'+plan.semester;
    const data=knowledgeDB[key];
    if(!data){container.innerHTML='<p style="text-align:center;color:#666;padding:20px">该课程暂无可用内容</p>';return;}

    let html='';
    data.units.slice(0,5).forEach((unit,idx)=>{
        const isCompleted=idx<(plan.completedUnits||0);
        html+=`<div class="task-item">
            <div class="task-checkbox ${isCompleted?'completed':''}">${isCompleted?'✓':''}</div>
            <div class="task-info">
                <div style="font-weight:500">${unit.name}</div>
                <div style="font-size:0.85rem;color:#666">${plan.subject} | ${unit.items.length}个知识点</div>
            </div>
            <span class="task-points">${isCompleted?'✓':'+'}${unit.items.length*5}</span>
        </div>`;
    });
    container.innerHTML=html;
}

function openAddChildModal(){
    appState.editingChildId=null;
    document.getElementById('childModalTitle').textContent='添加孩子';
    document.getElementById('childName').value='';
    document.getElementById('childGrade').value='5';
    document.getElementById('childSemester').value='2';
    document.getElementById('childAge').value='11';
    document.getElementById('childModal').classList.add('active');
}

function closeChildModal(){
    document.getElementById('childModal').classList.remove('active');
}

function saveChild(){
    const name=document.getElementById('childName').value.trim();
    const grade=document.getElementById('childGrade').value;
    const semester=document.getElementById('childSemester').value;
    const age=document.getElementById('childAge').value;
    if(!name){alert('请输入昵称');return;}
    if(appState.editingChildId){
        const c=appState.children.find(x=>x.id===appState.editingChildId);
        if(c){c.name=name;c.grade=parseInt(grade);c.semester=parseInt(semester);c.age=parseInt(age)||0;c.avatar=name.charAt(0);}
    }else{
        appState.children.push({id:Date.now(),name,grade:parseInt(grade),semester:parseInt(semester),age:parseInt(age)||0,points:0,level:1,exp:0,streak:0,completedUnits:0,avatar:name.charAt(0)});
    }
    saveData();
    renderChildList();
    closeChildModal();
    alert('保存成功！');
}

function editChild(id){
    const c=appState.children.find(x=>x.id===id);
    if(!c) return;
    appState.editingChildId=id;
    document.getElementById('childModalTitle').textContent='编辑孩子';
    document.getElementById('childName').value=c.name;
    document.getElementById('childGrade').value=c.grade||5;
    document.getElementById('childSemester').value=c.semester||2;
    document.getElementById('childAge').value=c.age||11;
    document.getElementById('childModal').classList.add('active');
}

function deleteChild(id){
    if(!confirm('确定删除？')) return;
    appState.children=appState.children.filter(c=>c.id!==id);
    saveData();
    renderChildList();
}

function renderChildList(){
    const container=document.getElementById('childList');
    if(appState.children.length===0){
        container.innerHTML='<p style="text-align:center;color:#666;padding:40px">暂无孩子档案，点击上方"添加孩子"创建</p>';
        return;
    }
    let html='';
    appState.children.forEach(c=>{
        html+=`<div class="child-card">
            <div style="display:flex;align-items:center;gap:15px">
                <div class="child-avatar">${c.avatar||c.name.charAt(0)}</div>
                <div>
                    <h3>${c.name}</h3>
                    <div style="font-size:0.9rem;color:#666">${gradeNames[c.grade-1]||'未设'} ${c.semester===1?'上':'下'}学期 | ${c.age?c.age+'岁':''}</div>
                    <div style="font-size:0.85rem;color:#F59E0B;margin-top:5px">积分:${c.points} | Lv.${c.level} | 连续:${c.streak}天 | 单元:${c.completedUnits||0}</div>
                </div>
            </div>
            <div>
                <button class="btn btn-primary" onclick="editChild(${c.id})">编辑</button>
                <button class="btn btn-danger" onclick="deleteChild(${c.id})">删除</button>
            </div>
        </div>`;
    });
    container.innerHTML=html;
}

function openPlanModal(){
    document.getElementById('planName').value='';
    document.getElementById('planSubject').value='英语';
    document.getElementById('planGrade').value='5';
    document.getElementById('planSemester').value='2';
    document.getElementById('dailyUnits').value='2';
    document.getElementById('planDays').value='30';
    document.getElementById('planModal').classList.add('active');
}

function closePlanModal(){
    document.getElementById('planModal').classList.remove('active');
}

function createPlan(){
    const name=document.getElementById('planName').value.trim();
    const subject=document.getElementById('planSubject').value;
    const grade=parseInt(document.getElementById('planGrade').value);
    const semester=parseInt(document.getElementById('planSemester').value);
    const dailyUnits=parseInt(document.getElementById('dailyUnits').value);
    const days=parseInt(document.getElementById('planDays').value);
    if(!name){alert('请输入计划名称');return;}
    appState.plans.push({id:Date.now(),name,subject,grade,semester,dailyUnits,days,completedUnits:0,totalUnits:days*dailyUnits,active:true});
    saveData();
    renderPlanList();
    closePlanModal();
    alert('计划创建成功！');
}

function generateSmartPlan(){
    const child=appState.children[0];
    if(!child){alert('请先添加孩子信息');return;}
    const subjects=['语文','数学','英语'];
    const subject=subjects[Math.floor(Math.random()*subjects.length)];
    const planName=gradeNames[child.grade-1]+subject+(child.semester===1?'上':'下')+'学期学习计划';
    const key=subject+'_'+child.grade+'_'+child.semester;
    const data=knowledgeDB[key];
    const totalUnits=data?data.units.length*2:20;
    appState.plans.push({id:Date.now(),name:planName,subject,grade:child.grade,semester:child.semester,dailyUnits:2,days:Math.ceil(totalUnits/2),completedUnits:0,totalUnits,active:true});
    saveData();
    renderPlanList();
    alert('智能计划已生成：'+planName);
}

function renderPlanList(){
    const container=document.getElementById('planList');
    if(appState.plans.length===0){container.innerHTML='<p style="text-align:center;color:#666;padding:40px">暂无学习计划，点击上方按钮创建</p>';return;}
    const colors={'语文':'#FCE7F3','数学':'#DBEAFE','英语':'#D1FAE5','物理':'#FEF3C7','化学':'#E0E7FF','生物':'#D1FAE5','历史':'#FEE2E2','地理':'#FEF9C3','道德与法治':'#F3E8FF'};
    let html='';
    appState.plans.forEach(p=>{
        const pct=p.totalUnits>0?Math.round((p.completedUnits||0)/p.totalUnits*100):0;
        html+=`<div class="plan-card" style="border-left:4px solid ${colors[p.subject]||'#eee'}">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:1.2rem;font-weight:600">${p.name}</span>
                <span class="plan-badge" style="background:${colors[p.subject]||'#eee'};padding:4px 12px;border-radius:15px">${p.subject}</span>
            </div>
            <p style="color:#666;font-size:0.9rem;margin:8px 0">${gradeNames[p.grade-1]} ${p.semester===1?'上':'下'}学期 | 每天${p.dailyUnits}个单元 | ${p.days}天</p>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
                <span style="color:#666;font-size:0.9rem">进度: ${p.completedUnits||0}/${p.totalUnits} 单元 (${pct}%)</span>
                <button class="btn btn-primary" style="padding:5px 12px;font-size:12px" onclick="setActivePlan(${p.id})">${p.active?'✓进行中':'开始'}</button>
            </div>
        </div>`;
    });
    container.innerHTML=html;
}

function setActivePlan(id){
    appState.plans.forEach(p=>p.active=p.id===id);
    saveData();
    renderPlanList();
    renderTasks();
}

function renderAchievements(){
    const child=appState.children[0]||{};
    let html='';
    achievementData.forEach(ach=>{
        let current=ach.type==='points'?(child.points||0):ach.type==='level'?(child.level||1):ach.type==='units'?(child.completedUnits||0):(child.streak||0);
        let unlocked=current>=ach.req;
        let pct=Math.min((current/ach.req)*100,100);
        html+=`<div class="achievement-card ${unlocked?'':'locked'}">
            <div style="font-size:50px;margin-bottom:15px">${ach.icon}</div>
            <div style="font-weight:600">${ach.title}</div>
            <div style="font-size:0.85rem;color:#666">${ach.desc}</div>
            ${!unlocked?`<div style="height:6px;background:#e5e7eb;border-radius:3px;margin-top:10px"><div style="height:100%;background:#10B981;border-radius:3px;width:${pct}%"></div></div><small style="color:#666">${current}/${ach.req}</small>`:'<small style="color:#10B981">已解锁 ✓</small>'}
        </div>`;
    });
    document.getElementById('achievementList').innerHTML=html;
}

function renderShop(){
    const child=appState.children[0]||{};
    const owned=child.ownedItems||[];
    let html='';
    shopData.forEach(item=>{
        const hasIt=owned.includes(item.id);
        html+=`<div class="shop-card">
            <div style="font-size:50px;margin-bottom:15px">${item.icon}</div>
            <div style="font-weight:600">${item.title}</div>
            <div style="background:linear-gradient(135deg,#F59E0B,#FBBF24);color:white;padding:5px 15px;border-radius:15px;display:inline-block;margin:10px 0">${item.price}积分</div>
            <br>
            <button class="btn ${hasIt?'btn-secondary':'btn-primary'}" ${hasIt?'disabled':''} onclick="buyItem('${item.id}')">${hasIt?'已拥有':'购买'}</button>
        </div>`;
    });
    document.getElementById('shopList').innerHTML=html;
}

function buyItem(id){
    const child=appState.children[0];
    if(!child) return;
    const item=shopData.find(i=>i.id===id);
    if(!item) return;
    if((child.points||0)<item.price){alert('积分不足！需要 '+item.price+' 积分');return;}
    if(confirm('购买 '+item.title+'？需要 '+item.price+' 积分')){
        child.points-=item.price;
        child.ownedItems=child.ownedItems||[];
        child.ownedItems.push(id);
        saveData();
        updateDashboard();
        renderShop();
        alert('购买成功！');
    }
}

function logout(){
    if(!confirm('退出登录？')) return;
    document.getElementById('welcomeScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.remove('active');
    appState.currentUser=null;
    appState.role=null;
    saveData();
}
</script>
