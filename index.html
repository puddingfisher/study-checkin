<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智学伴侣 - 每日学习打卡</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#e4e8ec 100%);min-height:100vh}
        #welcomeScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;text-align:center;padding:20px}
        #welcomeScreen.hidden{display:none!important}
        .welcome-logo{width:100px;height:100px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:30px;font-size:50px}
        .welcome-title{font-size:3rem;font-weight:700;margin-bottom:15px}
        .welcome-subtitle{font-size:1.2rem;opacity:0.9;margin-bottom:40px}
        .role-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
        .role-card{background:white;color:#333;padding:40px 50px;border-radius:20px;cursor:pointer;transition:all 0.3s;min-width:220px}
        .role-card:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,0,0,0.3)}
        .role-card-icon{font-size:48px;margin-bottom:15px}
        #mainApp{display:none;padding:20px;max-width:1200px;margin:0 auto}
        #mainApp.active{display:block!important}
        .header{background:white;padding:20px 30px;border-radius:15px;margin-bottom:25px;box-shadow:0 4px 15px rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px}
        .header h1{font-size:1.8rem;color:#4F46E5}
        .btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s}
        .btn-primary{background:#4F46E5;color:white}.btn-success{background:#10B981;color:white}.btn-danger{background:#EF4444;color:white}.btn-secondary{background:#6B7280;color:white}
        .nav-tabs{display:flex;gap:8px;margin-bottom:25px;flex-wrap:wrap;background:white;padding:10px;border-radius:12px}
        .nav-tab{padding:10px 18px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#666}
        .nav-tab:hover{background:#f3f4f6;color:#4F46E5}.nav-tab.active{background:#4F46E5;color:white}
        .content-area{display:none}.content-area.active{display:block}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:white;padding:25px;border-radius:15px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.08)}
        .stat-value{font-size:2.5rem;font-weight:700;margin-bottom:5px}.stat-label{color:#666;font-size:0.95rem}
        .checkin-section{background:white;padding:30px;border-radius:20px;text-align:center;margin-bottom:25px}
        .checkin-btn{background:linear-gradient(135deg,#10B981 0%,#34D399 100%);color:white;border:none;padding:20px 50px;border-radius:50px;font-size:1.3rem;font-weight:700;cursor:pointer}
        .task-list{background:white;border-radius:15px;padding:25px}
        .task-item{padding:18px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:15px}
        .task-item:last-child{border-bottom:none}
        .task-checkbox{width:28px;height:28px;border:2px solid #d1d5db;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .task-checkbox.completed{background:#10B981;border-color:#10B981;color:white}
        .task-info{flex:1}.task-points{background:linear-gradient(135deg,#F59E0B,#FBBF24);color:white;padding:4px 12px;border-radius:15px;font-size:0.85rem;font-weight:600}
        .plan-card{background:white;padding:20px;border-radius:15px;margin-bottom:15px}
        .knowledge-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
        .knowledge-card{background:white;padding:20px;border-radius:15px;cursor:pointer;transition:all 0.2s}
        .knowledge-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,0.12)}
        .unit-list{margin-top:15px;max-height:400px;overflow-y:auto}
        .unit-item{padding:10px;background:#f9fafb;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
        .unit-item:hover{background:#e5e7eb}
        .unit-item.selected{background:#dbeafe;border:2px solid #4F46E5}
        .achievement-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px}
        .achievement-card{background:white;padding:25px;border-radius:15px;text-align:center}
        .achievement-card.locked{opacity:0.5;filter:grayscale(1)}
        .shop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
        .shop-card{background:white;padding:25px;border-radius:15px;text-align:center}
        .child-card{background:white;padding:20px;border-radius:15px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
        .child-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:white;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;padding:20px;overflow-y:auto}
        .modal.active{display:flex;justify-content:center;align-items:flex-start;padding-top:50px}
        .modal-content{background:white;padding:30px;border-radius:20px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto}
        .form-group{margin-bottom:15px}.form-group label{display:block;margin-bottom:5px;font-weight:500}.form-group input,.form-group select{width:100%;padding:10px 15px;border:2px solid #e5e7eb;border-radius:8px;font-size:1rem}
        .checkin-result{margin-top:20px;padding:15px;border-radius:10px}
        .checkin-result.success{background:#D1FAE5;color:#065F46}.checkin-result.already{background:#FEF3C7;color:#92400E}
        .grade-filter{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;padding:15px;background:white;border-radius:12px}
        .grade-filter select{padding:8px 15px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px}
        .calendar{background:white;border-radius:15px;padding:20px}
        .calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}
        .calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;transition:all 0.2s}
        .calendar-day:hover{background:#f3f4f6}
        .calendar-day.checked{background:#10B981;color:white}
        .calendar-day.today{border:2px solid #4F46E5}
        .calendar-day.empty{background:transparent;cursor:default}
        .weekday{font-weight:500;color:#666;font-size:0.9rem;padding:10px 0}
        .typing-area{background:white;border-radius:15px;padding:30px;margin-bottom:20px}
        .word-display{font-size:3rem;font-weight:700;text-align:center;margin:30px 0;color:#4F46E5;letter-spacing:5px}
        .word-input{width:100%;padding:15px;font-size:1.5rem;text-align:center;border:2px solid #e5e7eb;border-radius:10px;outline:none}
        .word-input:focus{border-color:#4F46E5}
        .word-stats{display:flex;justify-content:center;gap:30px;margin-top:20px}
        .word-stat{text-align:center}
        .word-stat-value{font-size:1.5rem;font-weight:700;color:#4F46E5}
        .word-stat-label{color:#666;font-size:0.9rem}
        .quiz-option{padding:12px;background:white;border:2px solid #e5e7eb;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
        .quiz-option:hover{border-color:#4F46E5}
        .quiz-option.correct{background:#d1fae5;border-color:#10B981}
        .quiz-option.wrong{background:#fee2e2;border-color:#EF4444}
        @media(max-width:768px){.welcome-title{font-size:2rem}.header{flex-direction:column;text-align:center}.stats-grid{grid-template-columns:repeat(2,1fr)}.word-display{font-size:2rem}}
    </style>
</head>
<body>
<div id="welcomeScreen">
    <div class="welcome-logo">&#127890;</div>
    <h1 class="welcome-title">智学伴侣</h1>
    <p class="welcome-subtitle">每日学习打卡，陪伴孩子成长</p>
    <div class="role-cards">
        <div class="role-card" onclick="selectRole('parent')"><div class="role-card-icon">&#128104;&#128105;&#128103;</div><h2>我是家长</h2><p>管理孩子，定制学习计划</p></div>
        <div class="role-card" onclick="selectRole('student')"><div class="role-card-icon">&#128104;&#127996;</div><h2>我是学生</h2><p>每日打卡，学习知识</p></div>
    </div>
</div>
<div id="mainApp">
    <div class="header">
        <div><h1>&#127890; 智学伴侣</h1><p>欢迎, <span id="userName">用户</span> | <span id="userRole">角色</span></p></div>
        <div style="display:flex;gap:10px;align-items:center"><span id="userBadge" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:8px 16px;border-radius:20px">Lv.1</span><button class="btn btn-secondary" onclick="logout()">退出</button></div>
    </div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab(this,'dashboard')">&#128202; 仪表盘</button>
        <button class="nav-tab" onclick="switchTab(this,'checkin')">&#10004; 打卡</button>
        <button class="nav-tab" onclick="switchTab(this,'plans')">&#128203; 计划</button>
        <button class="nav-tab" onclick="switchTab(this,'knowledge')">&#128218; 知识库</button>
        <button class="nav-tab" onclick="switchTab(this,'practice')">&#128187; 练习</button>
        <button class="nav-tab" onclick="switchTab(this,'achievements')">&#127942; 成就</button>
        <button class="nav-tab" onclick="switchTab(this,'children')">&#128118; 孩子</button>
    </div>
    <div class="content-area active" id="dashboard">
        <div class="stats-grid">
            <div class="stat-card"><div style="font-size:36px">&#128293;</div><div class="stat-value" id="streakDays" style="color:#F59E0B">0</div><div class="stat-label">连续打卡</div></div>
            <div class="stat-card"><div style="font-size:36px">&#11088;</div><div class="stat-value" id="totalPoints" style="color:#10B981">0</div><div class="stat-label">总积分</div></div>
            <div class="stat-card"><div style="font-size:36px">&#127941;</div><div class="stat-value" id="userLevel" style="color:#4F46E5">Lv.1</div><div class="stat-label">等级</div></div>
            <div class="stat-card"><div style="font-size:36px">&#128218;</div><div class="stat-value" id="totalWords" style="color:#EF4444">0</div><div class="stat-label">已学单词</div></div>
        </div>
        <h2 style="margin-bottom:15px">&#128203; 今日学习任务</h2>
        <div class="task-list" id="taskList"></div>
    </div>
    <div class="content-area" id="checkin">
        <div class="checkin-section"><h2 style="margin-bottom:20px">&#127919; 每日打卡</h2><button class="checkin-btn" onclick="doCheckin()">&#10024; 立即打卡</button><div id="checkinResult"></div></div>
        <h3 style="margin-bottom:15px">&#128197; <span id="checkinMonth"></span> 打卡日历</h3>
        <div class="calendar" id="checkinCalendar"></div>
    </div>
    <div class="content-area" id="plans">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px"><h2>&#128203; 学习计划</h2><div style="display:flex;gap:10px"><button class="btn btn-success" onclick="openPlanModal()">&#10133; 创建计划</button><button class="btn btn-primary" onclick="generateSmartPlan()">&#129504; 智能生成</button></div></div>
        <div id="planList"></div>
    </div>
    <div class="content-area" id="knowledge">
        <h2 style="margin-bottom:20px">&#128218; 英语词库</h2>
        <div class="grade-filter">
            <select id="filterGrade"><option value="0">全部年级</option><option value="3-6">小学(3-6年级)</option><option value="7-9">初中(7-9年级)</option><option value="10-12">高中(10-12年级)</option></select>
            <select id="filterBook"><option value="">全部册</option><option value="上">上册</option><option value="下">下册</option></select>
            <button class="btn btn-primary" onclick="renderKnowledge()">筛选</button>
        </div>
        <div id="knowledgeContent"></div>
    </div>
    <div class="content-area" id="practice">
        <h2 style="margin-bottom:20px">&#128187; 单词练习</h2>
        <p style="color:#666;margin-bottom:20px" id="practiceInfo">根据学习计划自动安排每日练习</p>
        <div class="typing-area">
            <div class="word-display" id="wordDisplay">点击开始练习</div>
            <input type="text" class="word-input" id="wordInput" placeholder="请输入英文单词" autocomplete="off" disabled>
            <div class="word-stats">
                <div class="word-stat"><div class="word-stat-value" id="correctCount">0</div><div class="word-stat-label">正确</div></div>
                <div class="word-stat"><div class="word-stat-value" id="wrongCount">0</div><div class="word-stat-label">错误</div></div>
                <div class="word-stat"><div class="word-stat-value" id="remainCount">0</div><div class="word-stat-label">剩余</div></div>
            </div>
            <button class="btn btn-primary" style="width:100%;margin-top:20px" id="startPracticeBtn" onclick="startPractice()">开始练习</button>
            <button class="btn btn-success" style="width:100%;margin-top:10px;display:none" id="nextWordBtn" onclick="nextWord()">下一个</button>
        </div>
        <div id="practiceHistory" style="margin-top:20px"></div>
    </div>
    <div class="content-area" id="achievements"><h2 style="margin-bottom:20px">&#127942; 成就徽章</h2><div class="achievement-grid" id="achievementList"></div></div>
    <div class="content-area" id="children">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px"><h2>&#128118; 孩子管理</h2><button class="btn btn-success" onclick="openAddChildModal()">&#10133; 添加孩子</button></div>
        <div id="childList"></div>
    </div>
</div>
<div class="modal" id="childModal">
    <div class="modal-content"><h2 id="childModalTitle" style="margin-bottom:20px">添加孩子</h2>
        <div class="form-group"><label>孩子姓名 *</label><input type="text" id="childName" placeholder="请输入孩子姓名"></div>
        <div class="form-group"><label>年级</label>
            <select id="childGrade">
                <option value="3">小学三年级</option><option value="4">小学四年级</option><option value="5">小学五年级</option><option value="6">小学六年级</option>
                <option value="7">初中一年级</option><option value="8">初中二年级</option><option value="9">初中三年级</option>
                <option value="10">高中一年级</option><option value="11">高中二年级</option><option value="12">高中三年级</option>
            </select>
        </div>
        <div class="form-group"><label>每日打卡周期（天）</label>
            <select id="childCycle">
                <option value="7">1周</option><option value="14">2周</option><option value="30">1个月</option><option value="90">3个月</option>
            </select>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="saveChild()">保存</button>
    </div>
</div>
<div class="modal" id="planModal">
    <div class="modal-content"><h2 style="margin-bottom:20px">创建学习计划</h2>
        <div class="form-group"><label>计划名称</label><input type="text" id="planName" placeholder="例如：五年级英语学习"></div>
        <div class="form-group"><label>年级</label>
            <select id="planGrade">
                <option value="3">小学三年级</option><option value="4">小学四年级</option><option value="5">小学五年级</option><option value="6">小学六年级</option>
                <option value="7">初中一年级</option><option value="8">初中二年级</option><option value="9">初中三年级</option>
                <option value="10">高中一年级</option><option value="11">高中二年级</option><option value="12">高中三年级</option>
            </select>
        </div>
        <div class="form-group"><label>每日学习单词数</label><input type="number" id="dailyWords" value="10" min="5" max="50"></div>
        <div class="form-group"><label>学习周期（天）</label>
            <select id="planDays">
                <option value="7">1周</option><option value="14">2周</option><option value="30">1个月</option><option value="90">3个月</option>
            </select>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="createPlan()">创建</button>
        <button class="btn btn-secondary" style="width:100%;margin-top:10px" onclick="closePlanModal()">取消</button>
    </div>
</div>

let appState = {currentUser:null,role:null,children:[],plans:[],tasks:[],wordsLearned:0,practiceHistory:[]};

function loadData(){
    const saved=localStorage.getItem('studyAppData2');
    if(saved){
        try{appState={...appState,...JSON.parse(saved)};}catch(e){}
    }
    if(appState.currentUser){
        document.getElementById('welcomeScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.add('active');
        updateDashboard();
        renderTasks();
        renderCheckinCalendar();
        renderPlanList();
        renderAchievements();
        renderChildList();
        initPractice();
    }
}

function selectRole(role){
    const name=prompt('请输入您的名称:');
    if(!name||!name.trim()) return;
    appState.role=role;
    appState.currentUser=name.trim();
    saveData();
    document.getElementById('welcomeScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.add('active');
    if(role==='parent'){
        openAddChildModal();
    }
    updateDashboard();
    renderTasks();
    renderCheckinCalendar();
    renderPlanList();
    renderAchievements();
    renderChildList();
    initPractice();
}

function saveData(){
    localStorage.setItem('studyAppData2',JSON.stringify(appState));
}

function updateDashboard(){
    const child=appState.children[0]||{};
    document.getElementById('userName').textContent=appState.currentUser;
    document.getElementById('userRole').textContent=appState.role==='parent'?'家长':'学生';
    document.getElementById('streakDays').textContent=child.streak||0;
    document.getElementById('totalPoints').textContent=child.points||0;
    document.getElementById('userLevel').textContent='Lv.'+(child.level||1);
    document.getElementById('totalWords').textContent=appState.wordsLearned||0;
    document.getElementById('userBadge').textContent='Lv.'+(child.level||1);
}

function switchTab(el,tabId){
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.content-area').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(tabId).classList.add('active');
    if(tabId==='knowledge') renderKnowledge();
    if(tabId==='practice') initPractice();
    if(tabId==='achievements') renderAchievements();
}

function doCheckin(){
    const child=appState.children[0];
    if(!child){alert('请先添加孩子');return;}
    const today=new Date().toISOString().split('T')[0];
    const already=appState.tasks.some(t=>t.date===today&&t.type==='checkin');
    if(already){
        document.getElementById('checkinResult').innerHTML='<div class="checkin-result already">今日已打卡!</div>';
        return;
    }
    appState.tasks.push({date:today,type:'checkin',points:15});
    child.streak=(child.streak||0)+1;
    const points=15+Math.min(child.streak,20);
    child.points=(child.points||0)+points;
    child.exp=(child.exp||0)+points;
    if(child.exp>=100){
        child.level=(child.level||1)+1;
        child.exp=child.exp-100;
        document.getElementById('checkinResult').innerHTML='<div class="checkin-result success">打卡成功!+'+points+'积分 恭喜升级!</div>';
    }else{
        document.getElementById('checkinResult').innerHTML='<div class="checkin-result success">打卡成功!+'+points+'积分</div>';
    }
    saveData();
    updateDashboard();
    renderCheckinCalendar();
    renderTasks();
}

function renderCheckinCalendar(){
    const now=new Date();
    const year=now.getFullYear();
    const month=now.getMonth();
    document.getElementById('checkinMonth').textContent=year+'年'+(month+1)+'月';
    const firstDay=new Date(year,month,1).getDay();
    const daysInMonth=new Date(year,month+1,0).getDate();
    const checkedDates=appState.tasks.filter(t=>t.type==='checkin').map(t=>t.date);
    let html='<div class="calendar-grid"><div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div><div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>';
    for(let i=0;i<firstDay;i++)html+='<div class="calendar-day empty"></div>';
    const today=now.toISOString().split('T')[0];
    for(let d=1;d<=daysInMonth;d++){
        const dateStr=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const isChecked=checkedDates.includes(dateStr);
        const isToday=dateStr===today;
        html+='<div class="calendar-day'+(isChecked?' checked':'')+(isToday?' today':'')+'">'+d+'</div>';
    }
    html+='</div>';
    document.getElementById('checkinCalendar').innerHTML=html;
}

function renderTasks(){
    const child=appState.children[0];
    const container=document.getElementById('taskList');
    if(!child){
        container.innerHTML='<p style="text-align:center;color:#666;padding:20px">请先添加孩子</p>';
        return;
    }
    const today=new Date().toISOString().split('T')[0];
    const todayTasks=[];
    const plan=appState.plans.find(p=>p.active);
    if(plan){
        todayTasks.push({title:'学习'+plan.dailyWords+'个英语单词',subject:'英语',points:20,completed:false,type:'word'});
    }
    todayTasks.push({title:'每日打卡',subject:'综合',points:15,completed:appState.tasks.some(t=>t.date===today&&t.type==='checkin'),type:'checkin'});
    let html='';
    todayTasks.forEach(t=>{
        html+='<div class="task-item"><div class="task-checkbox '+(t.completed?'completed':'')+'">'+(t.completed?'&#10004;':'')+'</div><div class="task-info"><div style="font-weight:500">'+t.title+'</div><div style="font-size:0.85rem;color:#666">'+t.subject+'</div></div><span class="task-points">+'+(t.completed?'&#10004;':'+')+t.points+'</span></div>';
    });
    container.innerHTML=html;
}

function openAddChildModal(){
    appState.editingChildId=null;
    document.getElementById('childModalTitle').textContent='添加孩子';
    document.getElementById('childName').value='';
    document.getElementById('childGrade').value='5';
    document.getElementById('childCycle').value='30';
    document.getElementById('childModal').classList.add('active');
}

function saveChild(){
    const name=document.getElementById('childName').value.trim();
    const grade=document.getElementById('childGrade').value;
    const cycle=parseInt(document.getElementById('childCycle').value);
    if(!name){alert('请输入孩子姓名');return;}
    if(appState.editingChildId){
        const c=appState.children.find(x=>x.id===appState.editingChildId);
        if(c){c.name=name;c.grade=parseInt(grade);c.cycle=cycle;c.avatar=name.charAt(0);}
    }else{
        appState.children.push({id:Date.now(),name,grade:parseInt(grade),cycle,points:0,level:1,exp:0,streak:0,avatar:name.charAt(0)});
        const child=appState.children[appState.children.length-1];
        appState.plans.push({id:Date.now(),name:'英语学习计划',grade:child.grade,dailyWords:10,days:child.cycle,active:true,startDate:new Date().toISOString().split('T')[0]});
    }
    saveData();
    renderChildList();
    renderTasks();
    closeChildModal();
    alert('保存成功!');
}

function editChild(id){
    const c=appState.children.find(x=>x.id===id);
    if(!c) return;
    appState.editingChildId=id;
    document.getElementById('childModalTitle').textContent='编辑孩子';
    document.getElementById('childName').value=c.name;
    document.getElementById('childGrade').value=c.grade||5;
    document.getElementById('childCycle').value=c.cycle||30;
    document.getElementById('childModal').classList.add('active');
}

function deleteChild(id){
    if(!confirm('确定删除?')) return;
    appState.children=appState.children.filter(c=>c.id!==id);
    saveData();
    renderChildList();
}

    const container=document.getElementById('childList');
    if(appState.children.length===0){
        container.innerHTML='<p style="text-align:center;color:#666;padding:40px">暂无孩子档案，点击上方"添加孩子"创建</p>';
        return;
    }
    let html='';
    appState.children.forEach(c=>{
        html+='<div class="child-card"><div style="display:flex;align-items:center;gap:15px"><div class="child-avatar">'+(c.avatar||c.name.charAt(0))+'</div><div><h3>'+c.name+'</h3><div style="font-size:0.9rem;color:#666">'+gradeNames[c.grade]||'未设'+'</div><div style="font-size:0.85rem;color:#F59E0B;margin-top:5px">积分:'+(c.points||0)+' | Lv.'+(c.level||1)+' | 连续'+(c.streak||0)+'天</div></div></div><div><button class="btn btn-primary" onclick="editChild('+c.id+')">编辑</button><button class="btn btn-danger" onclick="deleteChild('+c.id+')">删除</button></div></div>';
    });
    container.innerHTML=html;
}

function closeChildModal(){
    document.getElementById('childModal').classList.remove('active');
}

function openPlanModal(){
    const child=appState.children[0];
    document.getElementById('planName').value='';
    document.getElementById('planGrade').value=child?child.grade:'5';
    document.getElementById('dailyWords').value='10';
    document.getElementById('planDays').value=child?child.cycle:'30';
    document.getElementById('planModal').classList.add('active');
}

function closePlanModal(){
    document.getElementById('planModal').classList.remove('active');
}

function createPlan(){
    const name=document.getElementById('planName').value.trim()||'英语学习计划';
    const grade=parseInt(document.getElementById('planGrade').value);
    const dailyWords=parseInt(document.getElementById('dailyWords').value)||10;
    const days=parseInt(document.getElementById('planDays').value)||30;
    const plan={id:Date.now(),name,grade,dailyWords,days,active:true,startDate:new Date().toISOString().split('T')[0]};
    appState.plans.forEach(p=>p.active=false);
    appState.plans.push(plan);
    saveData();
    renderPlanList();
    renderTasks();
    closePlanModal();
    alert('计划创建成功!');
}

function generateSmartPlan(){
    const child=appState.children[0];
    if(!child){alert('请先添加孩子');return;}
    document.getElementById('planName').value='';
    document.getElementById('planGrade').value=child.grade;
    document.getElementById('dailyWords').value='10';
    document.getElementById('planDays').value=child.cycle||30;
    openPlanModal();
}

function renderPlanList(){
    const container=document.getElementById('planList');
    if(appState.plans.length===0){
        container.innerHTML='<p style="text-align:center;color:#666;padding:20px">暂无学习计划，点击上方按钮创建</p>';
        return;
    }
    let html='';
    appState.plans.forEach(p=>{
        const badgeColor=p.active?'#10B981':'#6B7280';
        html+='<div class="plan-card"><div style="display:flex;justify-content:space-between;align-items:center"><div><h3>'+p.name+'</h3><div style="font-size:0.9rem;color:#666">'+gradeNames[p.grade]+' | 每天'+p.dailyWords+'个单词 | '+p.days+'天</div></div><span class="btn" style="background:'+badgeColor+';color:white"> '+(p.active?'进行中':'已暂停')+'</span></div><button class="btn '+(p.active?'btn-secondary':'btn-primary')+'" style="margin-top:10px" onclick="setActivePlan('+p.id+')">'+(p.active?'已选':'开始')+'</button></div>';
    });
    container.innerHTML=html;
}

function setActivePlan(id){
    appState.plans.forEach(p=>p.active=p.id===id);
    saveData();
    renderPlanList();
    renderTasks();
}

function renderKnowledge(){
    const container=document.getElementById('knowledgeContent');
    const filterGrade=document.getElementById('filterGrade').value;
    const filterBook=document.getElementById('filterBook').value;
    let html='<div class="knowledge-grid">';
    for(const[key,data]of Object.entries(englishWords)){
        const grade=parseInt(key.split('_')[0]);
        if(filterGrade){
            if(filterGrade=='3-6'&&(grade<3||grade>6))continue;
            if(filterGrade=='7-9'&&(grade<7||grade>9))continue;
            if(filterGrade=='10-12'&&(grade<10||grade>12))continue;
        }
        html+='<div class="knowledge-card" onclick="showWords(\''+key+'\')"><h3>'+data.name+'</h3><p style="color:#666;font-size:0.9rem;margin-top:5px">'+data.words.length+'个单词</p></div>';
    }
    html+='</div>';
    container.innerHTML=html;
}

function showWords(key){
    const data=englishWords[key];
    const container=document.getElementById('knowledgeContent');
    let html='<div style="margin-bottom:20px"><button class="btn btn-secondary" onclick="renderKnowledge()">返回词库</button></div><div class="unit-list">';
    data.words.forEach(w=>{
        html+='<div class="unit-item"><div style="display:flex;justify-content:space-between"><div><strong>'+w.word+'</strong> <span style="color:#666">'+w.phonetic+'</span></div><span style="color:#4F46E5">'+w.chinese+'</span></div></div>';
    });
    html+='</div>';
    container.innerHTML=html;
}

let practiceWords=[];
let currentWordIndex=0;
let correctCount=0;
let wrongCount=0;

function initPractice(){
    const plan=appState.plans.find(p=>p.active);
    if(!plan){
        document.getElementById('practiceInfo').textContent='请先创建学习计划';
        document.getElementById('startPracticeBtn').disabled=true;
        return;
    }
    document.getElementById('practiceInfo').textContent=gradeNames[plan.grade]+' | 每日'+plan.dailyWords+'个单词';
    document.getElementById('startPracticeBtn').disabled=false;
    document.getElementById('wordDisplay').textContent='点击开始练习';
    document.getElementById('wordInput').disabled=true;
    document.getElementById('wordInput').value='';
    document.getElementById('nextWordBtn').style.display='none';
    document.getElementById('correctCount').textContent='0';
    document.getElementById('wrongCount').textContent='0';
    document.getElementById('remainCount').textContent='0';
    currentWordIndex=0;
    correctCount=0;
    wrongCount=0;
    
    practiceWords=[];
    const gradeKey=plan.grade;
    for(const[key,data]of Object.entries(englishWords)){
        const g=parseInt(key.split('_')[0]);
        if(g===gradeKey||(gradeKey>=3&&g>=3&&g<=6&&gradeKey>=3&&gradeKey<=6)||(gradeKey>=7&&g>=7&&g<=9&&gradeKey>=7&&gradeKey<=9)||(gradeKey>=10&&g>=10&&gradeKey<=12)){
            if(g===gradeKey){
                practiceWords.push(...data.words.slice(0,plan.dailyWords));
                break;
            }
        }
    }
    if(practiceWords.length===0){
        const allGrades=Object.keys(englishWords);
        for(let g=3;g<=plan.grade;g++){
            const key=g+'_上';
            if(englishWords[key])practiceWords.push(...englishWords[key].words.slice(0,Math.ceil(plan.dailyWords/3)));
            const key2=g+'_下';
            if(englishWords[key2])practiceWords.push(...englishWords[key2].words.slice(0,Math.ceil(plan.dailyWords/3)));
        }
    }
    practiceWords=practiceWords.slice(0,plan.dailyWords);
    practiceWords.sort(()=>Math.random()-0.5);
    document.getElementById('remainCount').textContent=practiceWords.length;
}

function startPractice(){
    if(practiceWords.length===0){
        alert('请先创建学习计划');
        return;
    }
    currentWordIndex=0;
    showCurrentWord();
    document.getElementById('wordInput').disabled=false;
    document.getElementById('wordInput').focus();
    document.getElementById('nextWordBtn').style.display='inline-block';
}

function showCurrentWord(){
    if(currentWordIndex>=practiceWords.length){
        finishPractice();
        return;
    }
    const word=practiceWords[currentWordIndex];
    document.getElementById('wordDisplay').textContent=word.word;
    document.getElementById('wordInput').value='';
    document.getElementById('remainCount').textContent=practiceWords.length-currentWordIndex;
}

function nextWord(){
    const userAnswer=document.getElementById('wordInput').value.trim().toLowerCase();
    const correctAnswer=practiceWords[currentWordIndex].word.toLowerCase();
    if(userAnswer===correctAnswer){
        correctCount++;
        appState.wordsLearned++;
        document.getElementById('correctCount').textContent=correctCount;
    }else{
        wrongCount++;
        document.getElementById('wrongCount').textContent=wrongCount;
    }
    currentWordIndex++;
    saveData();
    showCurrentWord();
}

function finishPractice(){
    const child=appState.children[0];
    if(child){
        const bonus=correctCount*5;
        child.points=(child.points||0)+bonus;
        child.exp=(child.exp||0)+bonus;
        if(child.exp>=100){
            child.level=(child.level||1)+1;
            child.exp=child.exp-100;
        }
        saveData();
        updateDashboard();
    }
    document.getElementById('wordDisplay').textContent='练习完成!';
    document.getElementById('wordInput').disabled=true;
    document.getElementById('nextWordBtn').style.display='none';
    document.getElementById('remainCount').textContent='0';
    renderAchievements();
}

function renderAchievements(){
    const container=document.getElementById('achievementList');
    const child=appState.children[0]||{};
    let html='';
    achievementsList.forEach(a=>{
        let unlocked=false;
        if(a.type==='points'&&(child.points||0)>=a.req)unlocked=true;
        else if(a.type==='level'&&(child.level||0)>=a.req)unlocked=true;
        else if(a.type==='words'&&(appState.wordsLearned||0)>=a.req)unlocked=true;
        else if(!a.type&&(child.streak||0)>=a.req)unlocked=true;
        html+='<div class="achievement-card '+(unlocked?'':'locked')+'"><div style="font-size:36px;margin-bottom:10px">'+a.icon+'</div><h4>'+a.title+'</h4><p style="color:#666;font-size:0.85rem">'+a.desc+'</p></div>';
    });
    container.innerHTML=html;
}

function logout(){
    if(confirm('确定要退出登录吗?')){
        localStorage.removeItem('studyAppData2');
        location.reload();
    }
}
